<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palm Beach Ski Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a1628;
      color: #ffffff;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 2.8rem;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #a0b8d8;
      margin: 0 auto 1.5rem;
    }

    p {
      font-size: 1.2rem;
      color: #a0b8d8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .emoji {
      font-size: 2rem;
      margin-top: 2rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Palm Beach Ski Club</h1>
    <div class="divider"></div>
    <p>Currently at après — check back soon</p>
    <span class="emoji">🎿🍹</span>
  </div>
</body>
</html>
